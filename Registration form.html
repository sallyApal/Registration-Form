<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form Practice</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif;">
    <h1>Registration Form</h1>

    <form action="/process" method="post">
        <div>
            <label for="first_name">First Name: * </label>
            <input type="text" id="first_name" name="first_name">
        </div>
        <br>

        <div>
            <label for="last_name">Last Name: * </label>
            <input type="text" id="last_name" name="last_name">
        </div>
        <br>

        <div>
            <label for="email">Email Address: * </label>
            <input type="text" id="email" name="email">
        </div>
        <br>

        <div>
            <label for="password">Password: * </label>
            <input type="password" id="password" name="password">
        </div>
        <br>

        <div>
            <label for="confirm_password">Confirm Password: * </label>
            <input type="password" id="confirm_password" name="confirm_password">
        </div>
        <br>

        <div>
            <label for="dob">Birthday: </label>
            <input type="date" id="dob" name="dob">
        </div>
        <br>

        <div>
            <p>Gender Identity:</p>
            <input type="radio" name="gender" id="male" value="male">
            <label for="male">Male</label>
            
            <input type="radio" name="gender" id="female" value="female">
            <label for="female">Female</label>
            
            <input type="radio" name="gender" id="non-binary" value="non-binary">
            <label for="non-binary">Non-binary</label>
            
            <input type="radio" name="gender" id="no_answer" value="no_answer">
            <label for="no_answer">I prefer not to answer</label>
        </div>
        <br>

        <div>
            <p>A short description about myself:</p>
            <textarea name="description" id="description" cols="40" rows="3"></textarea>
        </div>
        <br>

        <div>
            <label for="language">Favorite Language: </label>
            <select name="language" id="language">
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
            </select>
        </div>
        <br>

        <div>
            <input type="checkbox" name="updates" id="updates" checked>
            <label for="updates">Yes, I would like to receive periodic email updates</label>
        </div>
        <br>

        <input type="submit" value="Create Account">

        <p>* Indicates a required field</p>
    </form>
</body>
</html>
